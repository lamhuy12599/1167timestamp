<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1167 Trương Định - Camera Timestamp</title>
    
    <link class="app-icon" rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/7-eleven_logo.svg/1280px-7-eleven_logo.svg.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & Font dựa trên template của bạn */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
        }
        
        /* BẢNG BIẾN MÀU SẮC CHUẨN 7-ELEVEN */
        :root {
            --7e-green: #008062;
            --7e-orange: #F37021;
            --7e-red: #E2231A;
            --bg-main: #F4F5F7;
            --bg-card: #ffffff;
            --text-main: #333;
            --text-muted: #666;
            --border-color: #eee;
        }

        [data-theme="dark"] {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --text-main: #f1f1f1;
            --text-muted: #aaa;
            --border-color: #333;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            padding: 20px 10px; 
            transition: 0.3s; 
        }
        
        .app-container { 
            width: 100%; 
            max-width: 480px; 
            background: var(--bg-card); 
            border-radius: 16px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); 
            overflow: hidden; 
            transition: 0.3s; 
        }

        /* Header chứa dải màu accent và Logo nằm ngang */
        .app-header { 
            background: var(--bg-card); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 15px; 
            border-bottom: 1px solid var(--border-color); 
            position: relative; 
            transition: 0.3s;
        }
        /* Dải màu thương hiệu đặc trưng ở đỉnh đầu */
        .app-header::before { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 6px; 
            background: linear-gradient(to right, var(--7e-green) 33%, var(--7e-red) 33%, var(--7e-red) 66%, var(--7e-orange) 66%); 
        }
        
        .header-left { display: flex; align-items: center; gap: 10px; }
        .app-logo { height: 32px; width: auto; object-fit: contain; }
        .app-header h2 { color: var(--7e-green); font-size: 19px; font-weight: 800; }
        
        .theme-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 5px; border-radius: 50%; }

        .app-body { padding: 20px; }

        /* Khung Viewfinder Camera tinh chỉnh để hòa hợp với Card UI */
        .camera-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border-color);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Lớp phủ thông tin chữ thuần trắng thanh lịch */
        .timestamp-overlay {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-family: 'Share Tech Mono', monospace;
            color: #FFF; /* Màu chữ thuần trắng */
            pointer-events: none;
            background: rgba(0, 0, 0, 0.35); /* Nền mờ giúp giữ độ tương phản cao */
            padding: 8px 12px;
            border-radius: 8px;
            line-height: 1.4;
        }

        #timestamp {
            font-size: 1.35rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #address {
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        /* CSS hiển thị Logo nhỏ đè bên góc phải khung ảnh */
        .logo-overlay {
            position: absolute;
            bottom: 15px;
            right: 15px;
            height: 45px;
            width: auto;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.9); /* Thêm nền trắng nhẹ cho logo nổi bật */
            padding: 4px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Nút bấm bo góc mềm mại, chuyển động mượt theo đúng form mẫu của bạn */
        .btn { 
            width: 100%; 
            padding: 14px; 
            font-size: 15px; 
            font-weight: bold; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 8px; 
            transition: 0.2s; 
        }
        .btn:active { transform: scale(0.98); }
        
        /* Sử dụng sắc đỏ thương hiệu cho nút hành động chính */
        .btn-snap { background-color: var(--7e-red); box-shadow: 0 4px 12px rgba(226, 35, 26, 0.2); }
        .btn-snap:hover { background-color: #bd1a12; }

        /* Canvas ẩn phục vụ render ảnh xuất ra */
        canvas { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/40/7-eleven_logo.svg" alt="7-Eleven Logo" class="app-logo">
            <h2>59 Trương Định</h2>
        </div>
        <button class="theme-btn" onclick="toggleTheme()" id="themeIcon">🌙</button>
    </div>

    <div class="app-body">
        <div class="camera-wrapper">
            <video id="video" autoplay playsinline></video>
            
            <div class="timestamp-overlay">
                <div id="timestamp">0000-00-00 00:00:00</div>
                <div id="address">59 Trương Định P.Bến Thành TP.Hồ Chí Minh</div>
            </div>

            <img id="logoSource" crossorigin="anonymous" src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/7-eleven_logo.svg/120px-7-eleven_logo.svg.png" class="logo-overlay" alt="7E Logo">
        </div>

        <button class="btn btn-snap" id="snapBtn">📷 CHỤP VÀ TẢI ẢNH</button>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    // Quản lý giao diện Sáng/Tối độc lập
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('appTheme', newTheme);
        const icon = document.getElementById('themeIcon');
        if (icon) icon.innerText = newTheme === 'dark' ? '☀️' : '🌙';
    }

    function initTheme() {
        const savedTheme = localStorage.getItem('appTheme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const icon = document.getElementById('themeIcon');
        if (icon) icon.innerText = savedTheme === 'dark' ? '☀️' : '🌙';
    }

    // Định dạng chuỗi thời gian camera
    function getFormattedTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
    }

    // Đợi cấu trúc HTML tải xong hoàn toàn mới thực thi code xử lý
    window.addEventListener('DOMContentLoaded', () => {
        initTheme();

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const timestampDiv = document.getElementById('timestamp');
        const snapBtn = document.getElementById('snapBtn');
        const logoSource = document.getElementById('logoSource');
        const ADDRESS_TEXT = "59 Trương Định P.Bến Thành TP.Hồ Chí Minh";

        // Khởi chạy đồng hồ thời gian thực
        if (timestampDiv) {
            timestampDiv.innerText = getFormattedTime();
            setInterval(() => {
                timestampDiv.innerText = getFormattedTime();
            }, 1000);
        }

        // Khởi động luồng lấy dữ liệu Camera an toàn chống crash
        async function initCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                console.error("Môi trường không hỗ trợ MediaDevices.");
                alert("⚠️ CẢNH BÁO: Ứng dụng cần chạy trên HTTPS hoặc Localhost để cấp quyền mở Camera.");
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                if (video) video.srcObject = stream;
            } catch (err) {
                console.error("Không thể kết nối camera: ", err);
                alert("❌ LỖI: Chưa cấp quyền camera hoặc thiết bị đang bận.");
            }
        }

        initCamera();

        // Xử lý logic vẽ và xuất ảnh khi click nút Chụp
        if (snapBtn && video && canvas) {
            snapBtn.addEventListener('click', () => {
                if (!video.videoWidth) {
                    alert("Camera chưa sẵn sàng, vui lòng đợi trong giây lát.");
                    return;
                }

                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // 1. Vẽ khung cảnh gốc từ camera
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Tính toán tỷ lệ font chữ theo độ phân giải ảnh thực tế
                const timeText = getFormattedTime();
                const fontSizeTime = Math.floor(canvas.height * 0.048);
                const fontSizeAddr = Math.floor(canvas.height * 0.034);
                
                // 2. Vẽ cụm text THUẦN TRẮNG (Đã bỏ đổ bóng đỏ)
                ctx.fillStyle = '#FFF';
                
                // Vẽ dòng thời gian
                ctx.font = `bold ${fontSizeTime}px 'Share Tech Mono', monospace`;
                ctx.fillText(timeText, 20, canvas.height - (fontSizeAddr + 40));
                
                // Vẽ dòng địa chỉ
                ctx.font = `bold ${fontSizeAddr}px 'Share Tech Mono', monospace`;
                ctx.fillText(ADDRESS_TEXT, 20, canvas.height - 25);
                
                // 3. Vẽ Logo 7-Eleven ở phía bên phải hình
                if (logoSource) {
                    const logoSize = Math.floor(canvas.height * 0.12); // Kích thước logo bằng 12% chiều cao ảnh
                    const logoX = canvas.width - logoSize - 20;       // Cách lề phải 20px
                    const logoY = canvas.height - logoSize - 20;      // Cách lề dưới 20px
                    
                    // Vẽ nền trắng bo góc nhẹ cho logo trên ảnh gốc (giống giao diện xem trước)
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                    ctx.beginPath();
                    ctx.roundRect(logoX - 4, logoY - 4, logoSize + 8, logoSize + 8, 6);
                    ctx.fill();
                    
                    // Vẽ đè logo lên trên nền trắng đó
                    ctx.drawImage(logoSource, logoX, logoY, logoSize, logoSize);
                }
                
                // 4. Xuất file chất lượng cao tải về máy
                const dataURL = canvas.toDataURL('image/jpeg', 0.95);
                const downloadLink = document.createElement('a');
                downloadLink.download = `7E_Snap_${Date.now()}.jpg`;
                downloadLink.href = dataURL;
                downloadLink.click();
            });
        }
    });
</script>
</body>
</html>
