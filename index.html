<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1167 Trương Định - Camera Timestamp</title>
    
    <!-- Icon 7-Eleven trên Tab trình duyệt -->
    <link class="app-icon" rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/7-eleven_logo.svg/1280px-7-eleven_logo.svg.png">
    
    <!-- Nhúng font chữ phong cách kỹ thuật số cho lớp hiển thị thời gian -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & Font dựa trên template */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
        }
        
        /* BẢNG BIẾN MÀU SẮC CHUẨN 7-ELEVEN */
        :root {
            --7e-green: #008062;
            --7e-orange: #F37021;
            --7e-red: #E2231A;
            --bg-main: #F4F5F7;
            --bg-card: #ffffff;
            --text-main: #333;
            --text-muted: #666;
            --border-color: #eee;
            --input-border: #ccc;
        }

        [data-theme="dark"] {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --text-main: #f1f1f1;
            --text-muted: #aaa;
            --border-color: #333;
            --input-border: #555;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            padding: 20px 10px; 
            transition: 0.3s; 
        }
        
        .app-container { 
            width: 100%; 
            max-width: 480px; 
            background: var(--bg-card); 
            border-radius: 16px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); 
            overflow: hidden; 
            transition: 0.3s; 
        }

        /* Header chứa dải màu accent và Logo nằm ngang */
        .app-header { 
            background: var(--bg-card); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 15px; 
            border-bottom: 1px solid var(--border-color); 
            position: relative; 
            transition: 0.3s;
        }
        /* Dải màu thương hiệu đặc trưng ở đỉnh đầu */
        .app-header::before { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 6px; 
            background: linear-gradient(to right, var(--7e-green) 33%, var(--7e-red) 33%, var(--7e-red) 66%, var(--7e-orange) 66%); 
        }
        
        .header-left { display: flex; align-items: center; gap: 10px; }
        .app-logo { height: 32px; width: auto; object-fit: contain; }
        .app-header h2 { color: var(--7e-green); font-size: 19px; font-weight: 800; }
        
        .theme-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 5px; border-radius: 50%; }

        .app-body { padding: 20px; }

        /* ĐƯỢC FIX: Bỏ thuộc tính tỷ lệ 4:3 cố định, để JS tự động tính toán theo camera thật */
        .camera-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border-color);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            margin-bottom: 18px;
            transition: aspect-ratio 0.15s ease-out; /* Tạo hiệu ứng mượt khi khớp khung hình */
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Đổi sang contain hoặc cover đều khít 100% vì khung wrapper đã đồng bộ */
            display: block;
        }

        /* Lớp phủ thông tin chữ TRẮNG VIỀN ĐEN sắc nét chống chìm chữ */
        .timestamp-overlay {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            font-family: 'Share Tech Mono', monospace;
            color: #FFF; 
            pointer-events: none;
            line-height: 1.4;
            /* Tạo viền đen bao quanh chữ bằng shadow đa hướng */
            text-shadow: 
                -1.5px -1.5px 0 #000,  
                 1.5px -1.5px 0 #000,
                -1.5px  1.5px 0 #000,
                 1.5px  1.5px 0 #000,
                 0px    1.5px 0 #000,
                 0px   -1.5px 0 #000,
                 1.5px   0px 0 #000,
                -1.5px   0px 0 #000;
            z-index: 5;
        }

        #timestamp {
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        #address {
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 2px;
            letter-spacing: 0.3px;
            word-wrap: break-word;
        }

        /* Logo đưa lên góc TRÊN bên phải để chống đè chữ khi chụp dọc */
        .logo-overlay {
            position: absolute;
            top: 15px;
            right: 15px;
            height: 42px;
            width: auto;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 4px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 5;
        }

        /* KHU VỰC Ô NHẬP ĐỊA CHỈ TRỰC TIẾP */
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-label {
            font-size: 12px;
            font-weight: bold;
            color: var(--7e-green);
            margin-bottom: 5px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .address-textbox {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-main);
            outline: none;
            transition: 0.2s;
        }
        .address-textbox:focus {
            border-color: var(--7e-orange);
            box-shadow: 0 0 8px rgba(243, 112, 33, 0.15);
        }

        /* Nút bấm bo góc mềm mại, chuyển động mượt */
        .btn { 
            width: 100%; 
            padding: 14px; 
            font-size: 15px; 
            font-weight: bold; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 8px; 
            transition: 0.2s; 
        }
        .btn:active { transform: scale(0.98); }
        .btn-snap { background-color: var(--7e-red); box-shadow: 0 4px 12px rgba(226, 35, 26, 0.2); }
        .btn-snap:hover { background-color: #bd1a12; }

        /* Canvas ẩn phục vụ render ảnh xuất ra */
        canvas { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Thanh tiêu đề chuẩn mẫu giao diện cửa hàng -->
    <div class="app-header">
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/40/7-eleven_logo.svg" alt="7-Eleven Logo" class="app-logo">
            <h2>59 Trương Định</h2>
        </div>
        <button class="theme-btn" onclick="toggleTheme()" id="themeIcon">🌙</button>
    </div>

    <div class="app-body">
        <!-- Khung hiển thị camera trực tiếp -->
        <div class="camera-wrapper" id="cameraWrapper">
            <video id="video" autoplay playsinline></video>
            
            <!-- Lớp phủ thông tin hiển thị thời gian và địa chỉ bên dưới -->
            <div class="timestamp-overlay">
                <div id="timestamp">0000-00-00 00:00:00</div>
                <div id="address">59 Trương Định P.Bến Thành TP.Hồ Chí Minh</div>
            </div>

            <!-- Logo 7-Eleven nhỏ hiển thị ở góc TRÊN bên phải -->
            <img id="logoSource" crossorigin="anonymous" src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/7-eleven_logo.svg/120px-7-eleven_logo.svg.png" class="logo-overlay" alt="7E Logo">
        </div>

        <!-- Ô TEXTBOX ĐỂ SỬA ĐỊA CHỈ TRỰC TIẾP -->
        <div class="input-group">
            <label class="input-label" for="addressInput">📍 Địa chỉ hiển thị trên ảnh:</label>
            <input type="text" id="addressInput" class="address-textbox" value="59 Trương Định P.Bến Thành TP.Hồ Chí Minh" placeholder="Nhập địa chỉ hoặc ghi chú ca làm việc...">
        </div>

        <!-- Nút chụp hình mềm mại đồng nhất phom nút cũ -->
        <button class="btn btn-snap" id="snapBtn">📷 CHỤP VÀ TẢI ẢNH</button>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    // Quản lý giao diện Sáng/Tối độc lập
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('appTheme', newTheme);
        const icon = document.getElementById('themeIcon');
        if (icon) icon.innerText = newTheme === 'dark' ? '☀️' : '🌙';
    }

    function initTheme() {
        const savedTheme = localStorage.getItem('appTheme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const icon = document.getElementById('themeIcon');
        if (icon) icon.innerText = savedTheme === 'dark' ? '☀️' : '🌙';
    }

    // Định dạng chuỗi thời gian camera
    function getFormattedTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
    }

    // Đợi cấu trúc HTML tải xong hoàn toàn mới thực thi code xử lý
    window.addEventListener('DOMContentLoaded', () => {
        initTheme();

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cameraWrapper = document.getElementById('cameraWrapper');
        const timestampDiv = document.getElementById('timestamp');
        const addressDiv = document.getElementById('address');
        const addressInput = document.getElementById('addressInput');
        const snapBtn = document.getElementById('snapBtn');
        const logoSource = document.getElementById('logoSource');

        // LẮNG NGHE SỰ KIỆN TEXTBOX: Cập nhật chữ trên màn hình live khi người dùng gõ
        if (addressInput && addressDiv) {
            addressDiv.innerText = addressInput.value;
            addressInput.addEventListener('input', () => {
                addressDiv.innerText = addressInput.value;
            });
        }

        // Khởi chạy đồng hồ thời gian thực
        if (timestampDiv) {
            timestampDiv.innerText = getFormattedTime();
            setInterval(() => {
                timestampDiv.innerText = getFormattedTime();
            }, 1000);
        }

        // ĐƯỢC FIX: Lắng nghe sự kiện nạp luồng video để ép khung hiển thị khớp tỷ lệ camera thật
        if (video && cameraWrapper) {
            video.addEventListener('loadedmetadata', () => {
                if (video.videoWidth && video.videoHeight) {
                    // Cập nhật tỷ lệ aspect-ratio của khung ngắm bằng chính xác tỷ lệ của camera thiết bị
                    cameraWrapper.style.aspectRatio = `${video.videoWidth} / ${video.videoHeight}`;
                }
            });
        }

        // Kích hoạt luồng Camera chất lượng cao (yêu cầu độ phân giải Full HD / 4K lý tưởng)
        async function initCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                console.error("Môi trường không hỗ trợ MediaDevices.");
                alert("⚠️ CẢNH BÁO: Ứng dụng cần chạy trên HTTPS hoặc Localhost để cấp quyền mở Camera.");
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 3840 },  
                        height: { ideal: 2160 }  
                    },
                    audio: false
                });
                if (video) video.srcObject = stream;
            } catch (err) {
                console.error("Không thể kết nối camera độ phân giải cao: ", err);
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment' },
                        audio: false
                    });
                    if (video) video.srcObject = fallbackStream;
                } catch (fallbackErr) {
                    alert("❌ LỖI: Chưa cấp quyền camera hoặc thiết bị đang bận.");
                }
            }
        }

        initCamera();

        // Xử lý logic vẽ và xuất ảnh chất lượng cao khi click nút Chụp
        if (snapBtn && video && canvas) {
            snapBtn.addEventListener('click', () => {
                if (!video.videoWidth) {
                    alert("Camera chưa sẵn sàng, vui lòng đợi trong giây lát.");
                    return;
                }

                const ctx = canvas.getContext('2d');
                
                // Khởi tạo kích thước canvas bằng kích thước pixel gốc từ camera
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // 1. Vẽ khung cảnh gốc từ camera (Khớp 100% không lệch khung hình nhờ đồng bộ tỷ lệ)
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Tính toán tỷ lệ font chữ dựa theo CẠNH NGẮN NHẤT để chữ không bị to/nhỏ bất thường giữa dọc và ngang
                const baseSize = Math.min(canvas.width, canvas.height);
                
                const timeText = getFormattedTime();
                const activeAddress = addressInput ? addressInput.value : "";
                
                const fontSizeTime = Math.floor(baseSize * 0.055);
                const fontSizeAddr = Math.floor(baseSize * 0.038);
                const padding = Math.floor(baseSize * 0.04);
                
                // Thiết lập thông số viền chữ chuyên nghiệp
                ctx.strokeStyle = '#000000'; 
                ctx.fillStyle = '#FFFFFF';   
                ctx.lineJoin = 'round';
                ctx.miterLimit = 2;

                // 2. Vẽ dòng địa chỉ (Dưới cùng)
                ctx.font = `bold ${fontSizeAddr}px 'Share Tech Mono', monospace`;
                const addrY = canvas.height - padding;
                ctx.lineWidth = Math.max(3, Math.floor(fontSizeAddr * 0.16));
                ctx.strokeText(activeAddress, padding, addrY);
                ctx.fillText(activeAddress, padding, addrY);

                // 3. Vẽ dòng thời gian (Phía trên dòng địa chỉ)
                ctx.font = `bold ${fontSizeTime}px 'Share Tech Mono', monospace`;
                const timeY = addrY - fontSizeAddr - Math.floor(baseSize * 0.02);
                ctx.lineWidth = Math.max(4, Math.floor(fontSizeTime * 0.16));
                ctx.strokeText(timeText, padding, timeY);
                ctx.fillText(timeText, padding, timeY);
                
                // 4. Vẽ Logo 7-Eleven ở góc TRÊN bên phải ảnh (Khớp chính xác vị trí hiển thị)
                if (logoSource) {
                    const logoSize = Math.floor(baseSize * 0.13); 
                    const logoX = canvas.width - logoSize - padding;
                    const logoY = padding;
                    
                    // Nền trắng bo góc nhẹ làm bệ đỡ cho logo trên ảnh gốc
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                    ctx.beginPath();
                    ctx.roundRect(logoX - 4, logoY - 4, logoSize + 8, logoSize + 8, Math.max(2, Math.floor(baseSize * 0.015)));
                    ctx.fill();
                    
                    ctx.drawImage(logoSource, logoX, logoY, logoSize, logoSize);
                }
                
                // 5. Xuất file ảnh JPEG chất lượng cao
                const dataURL = canvas.toDataURL('image/jpeg', 0.95);
                const downloadLink = document.createElement('a');
                downloadLink.download = `7E_Snap_${Date.now()}.jpg`;
                downloadLink.href = dataURL;
                downloadLink.click();
            });
        }
    });
</script>
</body>
</html>
