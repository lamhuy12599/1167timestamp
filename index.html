<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1167 Trương Định - Camera Timestamp</title>
    
    <!-- Icon 7-Eleven trên Tab trình duyệt -->
    <link class="app-icon" rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/7-eleven_logo.svg/1280px-7-eleven_logo.svg.png">
    
    <!-- Nhúng font chữ phong cách kỹ thuật số cho lớp hiển thị thời gian -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & Font */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
        }
        
        /* BẢNG BIẾN MÀU SẮC CHUẨN 7-ELEVEN */
        :root {
            --7e-green: #008062;
            --7e-orange: #F37021;
            --7e-red: #E2231A;
            --bg-main: #F4F5F7;
            --bg-card: #ffffff;
            --text-main: #333;
            --text-muted: #666;
            --border-color: #eee;
            --input-border: #ccc;
        }

        [data-theme="dark"] {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --text-main: #f1f1f1;
            --text-muted: #aaa;
            --border-color: #333;
            --input-border: #555;
        }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            padding: 20px 10px; 
            transition: 0.3s; 
        }
        
        .app-container { 
            width: 100%; 
            max-width: 480px; 
            background: var(--bg-card); 
            border-radius: 16px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); 
            overflow: hidden; 
            transition: 0.3s; 
        }

        /* Header chứa dải màu và Logo */
        .app-header { 
            background: var(--bg-card); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 15px; 
            border-bottom: 1px solid var(--border-color); 
            position: relative; 
            transition: 0.3s;
        }
        .app-header::before { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 6px; 
            background: linear-gradient(to right, var(--7e-green) 33%, var(--7e-red) 33%, var(--7e-red) 66%, var(--7e-orange) 66%); 
        }
        
        .header-left { display: flex; align-items: center; gap: 10px; }
        .app-logo { height: 32px; width: auto; object-fit: contain; }
        .app-header h2 { color: var(--7e-green); font-size: 19px; font-weight: 800; }
        
        .theme-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 5px; border-radius: 50%; }

        .app-body { padding: 20px; }

        /* Khung hiển thị camera trực tiếp */
        .camera-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--border-color);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            margin-bottom: 18px;
            transition: aspect-ratio 0.15s ease-out;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Lớp phủ chữ trắng viền đen sắc nét */
        .timestamp-overlay {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            font-family: 'Share Tech Mono', monospace;
            color: #FFF; 
            pointer-events: none;
            line-height: 1.4;
            text-shadow: 
                -1.5px -1.5px 0 #000,  
                 1.5px -1.5px 0 #000,
                -1.5px  1.5px 0 #000,
                 1.5px  1.5px 0 #000,
                 0px    1.5px 0 #000,
                 0px   -1.5px 0 #000,
                 1.5px   0px 0 #000,
                -1.5px   0px 0 #000;
            z-index: 5;
        }

        #timestamp { font-size: 1.3rem; font-weight: bold; letter-spacing: 0.5px; }
        #address { font-size: 0.85rem; font-weight: bold; margin-top: 2px; letter-spacing: 0.3px; word-wrap: break-word; }

        /* Logo góc trên bên phải */
        .logo-overlay {
            position: absolute;
            top: 15px;
            right: 15px;
            height: 42px;
            width: auto;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 4px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 5;
        }

        /* Khu vực ô nhập liệu Textbox */
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-label {
            font-size: 12px;
            font-weight: bold;
            color: var(--7e-green);
            margin-bottom: 5px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .address-textbox {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-main);
            outline: none;
            transition: 0.2s;
        }
        .address-textbox:focus {
            border-color: var(--7e-orange);
            box-shadow: 0 0 8px rgba(243, 112, 33, 0.15);
        }

        /* Các nút điều khiển */
        .actions-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
        }

        .btn { 
            width: 100%; 
            padding: 14px; 
            font-size: 15px; 
            font-weight: bold; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 8px; 
            transition: 0.2s; 
        }
        .btn:active { transform: scale(0.98); }
        
        .btn-snap { background-color: var(--7e-red); box-shadow: 0 4px 12px rgba(226, 35, 26, 0.2); }
        .btn-snap:hover { background-color: #bd1a12; }

        /* MỚI: Nút tải ảnh lên phong cách xanh lá 7-Eleven */
        .btn-upload { background-color: var(--7e-green); box-shadow: 0 4px 12px rgba(0, 128, 98, 0.2); }
        .btn-upload:hover { background-color: #005c46; }

        /* Canvas ẩn phục vụ render ảnh */
        canvas { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <div class="header-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/40/7-eleven_logo.svg" alt="7-Eleven Logo" class="app-logo">
            <h2>59 Trương Định</h2>
        </div>
        <button class="theme-btn" onclick="toggleTheme()" id="themeIcon">🌙</button>
    </div>

    <div class="app-body">
        <div class="camera-wrapper" id="cameraWrapper">
            <video id="video" autoplay playsinline></video>
            
            <div class="timestamp-overlay">
                <div id="timestamp">0000-00-00 00:00:00</div>
                <div id="address">59 Trương Định P.Bến Thành TP.Hồ Chí Minh</div>
            </div>

            <img id="logoSource" crossorigin="anonymous" src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/7-eleven_logo.svg/120px-7-eleven_logo.svg.png" class="logo-overlay" alt="7E Logo">
        </div>

        <!-- Ô sửa địa chỉ trực tiếp -->
        <div class="input-group">
            <label class="input-label" for="addressInput">📍 Địa chỉ hiển thị trên ảnh:</label>
            <input type="text" id="addressInput" class="address-textbox" value="59 Trương Định P.Bến Thành TP.Hồ Chí Minh" placeholder="Nhập địa chỉ hoặc ghi chú ca làm việc...">
        </div>

        <!-- Ô sửa thời gian hoặc để trống -->
        <div class="input-group">
            <label class="input-label" for="timeInput">⏱️ Thời gian hiển thị (Để trống nếu dùng giờ thực):</label>
            <input type="text" id="timeInput" class="address-textbox" value="" placeholder="Để trống để tự động lấy giờ hiện tại...">
        </div>

        <!-- Cụm nút bấm hành động -->
        <div class="actions-container">
            <!-- Nút 1: Chụp từ Camera trực tiếp -->
            <button class="btn btn-snap" id="snapBtn">📷 CHỤP VÀ TẢI ẢNH</button>
            
            <!-- Nút 2: Tải file ảnh có sẵn từ máy lên -->
            <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">📁 ĐÓNG DẤU ẢNH CÓ SẴN</button>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    // Quản lý giao diện Sáng/Tối
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('appTheme', newTheme);
        const icon = document.getElementById('themeIcon');
        if (icon) icon.innerText = newTheme === 'dark' ? '☀️' : '🌙';
    }

    function initTheme() {
        const savedTheme = localStorage.getItem('appTheme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const icon = document.getElementById('themeIcon');
        if (icon) icon.innerText = savedTheme === 'dark' ? '☀️' : '🌙';
    }

    // Lấy thời gian hiện tại định dạng chuẩn
    function getFormattedTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
    }

    // Âm thanh màn trập camera (Web Audio API)
    function playShutterSound() {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const audioCtx = new AudioContext();
            
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(580, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.05);
            oscGain.gain.setValueAtTime(0.35, audioCtx.currentTime);
            oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);

            const bufferSize = audioCtx.sampleRate * 0.07;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'highpass';
            noiseFilter.frequency.value = 1400;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.07);
            noise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noise.start();
            noise.stop(audioCtx.currentTime + 0.07);
        } catch (e) { console.log(e); }
    }

    window.addEventListener('DOMContentLoaded', () => {
        initTheme();

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cameraWrapper = document.getElementById('cameraWrapper');
        const timestampDiv = document.getElementById('timestamp');
        const addressDiv = document.getElementById('address');
        const addressInput = document.getElementById('addressInput');
        const timeInput = document.getElementById('timeInput');
        const snapBtn = document.getElementById('snapBtn');
        const fileInput = document.getElementById('fileInput');
        const logoSource = document.getElementById('logoSource');

        // Đồng bộ dữ liệu hiển thị từ TextBox lên khung Viewfinder
        if (addressInput && addressDiv) {
            addressDiv.innerText = addressInput.value;
            addressInput.addEventListener('input', () => { addressDiv.innerText = addressInput.value; });
        }

        if (timeInput && timestampDiv) {
            timeInput.addEventListener('input', () => {
                const userTime = timeInput.value.trim();
                timestampDiv.innerText = userTime !== "" ? userTime : getFormattedTime();
            });
        }

        // Vòng lặp đồng hồ thời gian thực
        if (timestampDiv) {
            timestampDiv.innerText = (timeInput && timeInput.value.trim() !== "") ? timeInput.value.trim() : getFormattedTime();
            setInterval(() => {
                if (timeInput && timeInput.value.trim() === "") { timestampDiv.innerText = getFormattedTime(); }
            }, 1000);
        }

        // Tự co giãn khung camera theo thiết bị
        if (video && cameraWrapper) {
            video.addEventListener('loadedmetadata', () => {
                if (video.videoWidth && video.videoHeight) {
                    cameraWrapper.style.aspectRatio = `${video.videoWidth} / ${video.videoHeight}`;
                }
            });
        }

        // Khởi tạo luồng Camera trực tiếp
        async function initCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 3840 }, height: { ideal: 2160 } },
                    audio: false
                });
                if (video) video.srcObject = stream;
            } catch (err) {
                try {
                    const fallback = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
                    if (video) video.srcObject = fallback;
                } catch (e) { console.log("Không mở được camera."); }
            }
        }
        initCamera();

        // MỚI: HÀM TRUNG GIAN DÙNG CHUNG ĐỂ IN DẤU LÊN ẢNH (DÙNG CHO CẢ CHỤP VÀ UPLOAD)
        function drawWatermarkAndDownload(sourceElement, isVideoSource) {
            const imgWidth = isVideoSource ? sourceElement.videoWidth : sourceElement.naturalWidth;
            const imgHeight = isVideoSource ? sourceElement.videoHeight : sourceElement.naturalHeight;

            if (!imgWidth || !imgHeight) {
                alert("Hình ảnh chưa sẵn sàng xử lý.");
                return;
            }

            // Phát tiếng âm thanh chụp ảnh
            playShutterSound();

            const ctx = canvas.getContext('2d');
            canvas.width = imgWidth;
            canvas.height = imgHeight;
            
            // 1. Vẽ ảnh gốc vào canvas
            ctx.drawImage(sourceElement, 0, 0, canvas.width, canvas.height);
            
            // Tính toán tỷ lệ font chữ thông minh theo cạnh ngắn nhất của ảnh
            const baseSize = Math.min(canvas.width, canvas.height);
            const timeText = (timeInput && timeInput.value.trim() !== "") ? timeInput.value.trim() : getFormattedTime();
            const activeAddress = addressInput ? addressInput.value : "";
            
            const fontSizeTime = Math.floor(baseSize * 0.055);
            const fontSizeAddr = Math.floor(baseSize * 0.038);
            const padding = Math.floor(baseSize * 0.04);
            
            ctx.strokeStyle = '#000000'; 
            ctx.fillStyle = '#FFFFFF';   
            ctx.lineJoin = 'round';
            ctx.miterLimit = 2;

            // 2. Vẽ dòng địa chỉ (Dưới cùng)
            ctx.font = `bold ${fontSizeAddr}px 'Share Tech Mono', monospace`;
            const addrY = canvas.height - padding;
            ctx.lineWidth = Math.max(3, Math.floor(fontSizeAddr * 0.16));
            ctx.strokeText(activeAddress, padding, addrY);
            ctx.fillText(activeAddress, padding, addrY);

            // 3. Vẽ dòng thời gian (Trên dòng địa chỉ)
            ctx.font = `bold ${fontSizeTime}px 'Share Tech Mono', monospace`;
            const timeY = addrY - fontSizeAddr - Math.floor(baseSize * 0.02);
            ctx.lineWidth = Math.max(4, Math.floor(fontSizeTime * 0.16));
            ctx.strokeText(timeText, padding, timeY);
            ctx.fillText(timeText, padding, timeY);
            
            // 4. Vẽ Logo 7-Eleven góc trên bên phải
            if (logoSource) {
                const logoSize = Math.floor(baseSize * 0.13); 
                const logoX = canvas.width - logoSize - padding;
                const logoY = padding;
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.beginPath();
                ctx.roundRect(logoX - 4, logoY - 4, logoSize + 8, logoSize + 8, Math.max(2, Math.floor(baseSize * 0.015)));
                ctx.fill();
                
                ctx.drawImage(logoSource, logoX, logoY, logoSize, logoSize);
            }
            
            // 5. Xuất ảnh và tự động tải về luôn
            const dataURL = canvas.toDataURL('image/jpeg', 0.95);
            const downloadLink = document.createElement('a');
            downloadLink.download = isVideoSource ? `7E_Snap_${Date.now()}.jpg` : `7E_Watermarked_${Date.now()}.jpg`;
            downloadLink.href = dataURL;
            downloadLink.click();
        }

        // Sự kiện khi bấm nút Chụp ảnh trực tiếp từ camera
        if (snapBtn && video) {
            snapBtn.addEventListener('click', () => {
                if (!video.videoWidth) {
                    alert("Camera chưa sẵn sàng, vui lòng đợi trong giây lát.");
                    return;
                }
                drawWatermarkAndDownload(video, true);
            });
        }

        // MỚI: Sự kiện xử lý file ảnh khi người dùng chọn Tải ảnh lên từ bộ nhớ máy
        if (fileInput) {
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        // Kích hoạt hàm in dấu lên đối tượng ảnh vừa upload
                        drawWatermarkAndDownload(img, false);
                        // Reset lại input để có thể chọn tiếp cùng một ảnh nếu muốn
                        fileInput.value = "";
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }
    });
</script>
</body>
</html>
